name: Sync Substack notes

on:
  schedule:
    - cron: "0 13 * * *" # 06:00 PT daily
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Sync Substack notes
        run: npm run sync:substack

      - name: Commit new notes
        run: |
          git config user.name "substack-sync-bot"
          git config user.email "bot@tanchao.xyz"
          git add src/content/notes/
          if git diff --cached --quiet; then
            echo "No new notes to commit."
            exit 0
          fi
          git commit -m "chore(notes): sync Substack notes [skip ci]"
          git push
