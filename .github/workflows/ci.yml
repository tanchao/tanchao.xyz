name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check for broken internal links
        run: |
          npm install -g @lhci/cli 2>/dev/null || true
          # Simple broken-link check via find on built HTML
          echo "Build succeeded — $(find dist -name '*.html' | wc -l) HTML files generated."
